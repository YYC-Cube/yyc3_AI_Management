# YYC3 AI Management - Docker Compose (Production)
# 部署目标: api.yyc3.top

version: '3.8'

services:
  # ==================== Next.js 前端应用 ====================
  app:
    image: ghcr.io/YYC-Cube/yyc3_AI_Management:latest
    container_name: yyc3-management-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://api.yyc3.top
      - NEXT_PUBLIC_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - yyc3-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: yyc3-management-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - yyc3-network
    healthcheck:
      test: ["CMD", "curl", "-f", "https://api.yyc3.top/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  yyc3-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
